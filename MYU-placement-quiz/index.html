function Compass({ progress = 0, highlight = null, size = 132 }) {
  const r = 52;
  const c = 2 * Math.PI * r;
  const quarter = c / 4;
  const gap = 3;
  return (
    <svg width={size} height={size} viewBox="0 0 132 132" className="upr-compass">
      <circle cx="66" cy="66" r={r} fill="none" stroke="rgba(245,241,232,0.10)" strokeWidth="10" />
      {PHASES.map((p, i) => {
        const isLit = highlight ? p.id === highlight : i * quarter < progress * c;
        return (
          <circle
            key={p.id}
            cx="66" cy="66" r={r}
            fill="none"
            stroke={isLit ? p.color : "rgba(245,241,232,0.10)"}
            strokeWidth="10"
            strokeDasharray={`${quarter - gap} ${c - quarter + gap}`}
            strokeDashoffset={-(i * quarter)}
            strokeLinecap="round"
            transform="rotate(-90 66 66)"
            style={{
              transition: "stroke 0.6s ease, opacity 0.6s ease",
              opacity: isLit ? 1 : 0.55,
              filter: isLit && highlight ? `drop-shadow(0 0 6px ${p.color})` : "none",
            }}
          />
        );
      })}
      <circle cx="66" cy="66" r="34" fill="rgba(245,241,232,0.05)" stroke="rgba(203,169,102,0.4)" strokeWidth="1" />
      <text x="66" y="72" textAnchor="middle" fontSize="26" fill={GOLD_LIGHT} style={{ fontFamily: "'Cormorant Garamond', serif" }}>
        ✦
      </text>
    </svg>
  );
}

        .upr-name-input:focus { border-color: ${GOLD}; background: rgba(245,241,232,0.09); }
        .upr-greeting {
          text-align: center; font-family: 'Cormorant Garamond', serif; font-style: italic;
          font-size: 15px; color: rgba(245,241,232,0.55); margin: 0 0 10px; letter-spacing: 0.02em;
        }
        .upr-btn {
          display: block; margin: 0 auto; padding: 16px 40px;
          background: linear-gradient(135deg, ${GOLD} 0%, #A9884E 100%);
          color: #1B1108; border: none; border-radius: 999px;
          font-weight: 600; font-size: 14.5px; letter-spacing: 0.03em; cursor: pointer;
          box-shadow: 0 8px 24px rgba(203,169,102,0.28);
          transition: transform 0.25s ease, box-shadow 0.25s ease;
        }
        .upr-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(203,169,102,0.4); }
        .upr-btn-ghost { background: transparent; border: 1px solid rgba(245,241,232,0.28); color: ${INK}; box-shadow: none; }
        .upr-btn-ghost:hover { border-color: ${GOLD}; box-shadow: none; }
        .upr-legend { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; margin-top: 22px; }
        .upr-legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: rgba(245,241,232,0.65); }
        .upr-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }

        .upr-progresswrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .upr-progress-label { margin-top: 10px; font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(245,241,232,0.55); }
        .upr-phase-tag { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: ${GOLD_LIGHT}; text-align: center; margin-bottom: 10px; }
        .upr-qcard {
          background: rgba(245,241,232,0.05); border: 1px solid rgba(245,241,232,0.12);
          border-radius: 20px; padding: 34px 28px; backdrop-filter: blur(6px);
        }
        .upr-qtext {
          font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px;
          line-height: 1.55; text-align: center; color: ${INK}; margin: 0 0 30px;
        }
        .upr-options { display: flex; flex-direction: column; gap: 10px; }
        .upr-opt {
          display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-radius: 14px;
          border: 1px solid rgba(245,241,232,0.16); background: rgba(245,241,232,0.02);
          color: ${INK}; font-size: 14px; font-weight: 400; text-align: left; cursor: pointer;
          transition: all 0.2s ease;
        }
        .upr-opt:hover { border-color: ${GOLD}; background: rgba(203,169,102,0.10); transform: translateX(3px); }
        .upr-opt-num {
          width: 26px; height: 26px; border-radius: 50%; border: 1px solid rgba(245,241,232,0.3);
          display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0;
        }
        .upr-navrow { display: flex; justify-content: space-between; margin-top: 20px; }
        .upr-link-btn { background: none; border: none; color: rgba(245,241,232,0.5); font-size: 12.5px; cursor: pointer; letter-spacing: 0.04em; }
        .upr-link-btn:hover { color: ${GOLD_LIGHT}; }
        .upr-link-btn:disabled { opacity: 0; cursor: default; }

        .upr-loading { text-align: center; padding: 90px 0; }
        .upr-loading-text { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 19px; color: ${GOLD_LIGHT}; margin-top: 22px; animation: upr-pulse 1.6s ease-in-out infinite; }
        @keyframes upr-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
        .upr-spin { animation: upr-spin 3s linear infinite; }
        @keyframes upr-spin { to { transform: rotate(360deg); } }

        .upr-result-icon { text-align: center; font-size: 34px; margin-bottom: 6px; }
        .upr-result-tag { text-align: center; font-size: 11.5px; letter-spacing: 0.14em; text-transform: uppercase; color: ${GOLD}; margin-bottom: 6px; }
        .upr-result-name { font-family: 'Playfair Display', serif; font-weight: 700; font-size: clamp(26px, 5.5vw, 36px); text-align: center; margin: 0 0 6px; }
        .upr-result-module { text-align: center; font-size: 13px; color: rgba(245,241,232,0.55); margin: 0 0 22px; letter-spacing: 0.03em; }
        .upr-insight {
          font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 18px; line-height: 1.75;
          text-align: center; color: rgba(245,241,232,0.9); max-width: 470px; margin: 0 auto 34px;
        }
        .upr-section-label { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: ${GOLD_LIGHT}; text-align: center; margin: 40px 0 18px; }
        .upr-lesson-card {
          background: rgba(245,241,232,0.05); border: 1px solid rgba(245,241,232,0.14);
          border-left: 3px solid ${GOLD}; border-radius: 14px; padding: 20px 22px; margin-bottom: 14px;
        }
        .upr-lesson-tag { font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: ${GOLD}; margin-bottom: 6px; }
        .upr-lesson-title { font-family: 'Playfair Display', serif; font-weight: 600; font-size: 18px; margin: 0 0 8px; color: ${INK}; }
        .upr-lesson-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .upr-lesson-row-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: rgba(203,169,102,0.85); flex-shrink: 0; padding-top: 1px; min-width: 62px; }
        .upr-lesson-row-text { font-size: 13.5px; line-height: 1.6; color: rgba(245,241,232,0.85); margin: 0; }
        .upr-lesson-link {
          display: inline-block; margin-top: 10px; padding: 9px 20px; border-radius: 999px;
          background: rgba(203,169,102,0.16); border: 1px solid rgba(203,169,102,0.5);
          color: ${GOLD_LIGHT}; text-decoration: none; font-size: 12.5px; font-weight: 600;
        }
        .upr-lesson-link:hover { background: rgba(203,169,102,0.28); }
        .upr-lesson-link-secondary {
          display: inline-block; margin-top: 8px; margin-left: 8px; font-size: 12px; color: rgba(245,241,232,0.55); text-decoration: underline;
        }

        .upr-vault-card {
          margin-top: 30px; padding: 22px 22px; border-radius: 16px;
          background: linear-gradient(135deg, rgba(139,123,184,0.10), rgba(203,169,102,0.10));
          border: 1px solid rgba(184,170,217,0.35);
        }
        .upr-vault-eyebrow { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: ${VIOLET_SOFT}; margin-bottom: 8px; }
        .upr-vault-title { font-family: 'Playfair Display', serif; font-size: 18px; margin: 0 0 4px; }
        .upr-vault-date { font-size: 12px; color: rgba(245,241,232,0.5); margin: 0 0 10px; font-style: italic; }
        .upr-vault-blurb { font-size: 13.5px; line-height: 1.6; color: rgba(245,241,232,0.85); margin: 0 0 12px; }

        .upr-foundations-card {
          margin-top: 16px; padding: 18px 22px; border-radius: 16px;
          background: rgba(245,241,232,0.04); border: 1px dashed rgba(245,241,232,0.25);
        }
        .upr-foundations-eyebrow { font-size: 10.5px; letter-spacing: 0.16em; text-transform: uppercase; color: rgba(245,241,232,0.5); margin-bottom: 8px; }
        .upr-foundations-text { font-size: 13px; line-height: 1.6; color: rgba(245,241,232,0.75); margin: 0 0 12px; }

        .upr-bottomrow { display: flex; gap: 12px; justify-content: center; margin-top: 36px; flex-wrap: wrap; }

        .upr-footer {
          margin-top: 40px; padding-top: 18px; border-top: 1px solid rgba(245,241,232,0.08);
          text-align: center; font-size: 10.5px; color: rgba(245,241,232,0.4);
          display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; letter-spacing: 0.01em;
        }
        .upr-footer a { color: rgba(245,241,232,0.45); text-decoration: underline; }
        .upr-footer a:hover { color: ${GOLD_LIGHT}; }
        .upr-footer-dot { opacity: 0.5; }
      `}</style>

      <div className="upr-shell">
        {screen === "intro" && (
          <>
            <div className="upr-eyebrow">Manifest Your Union · Your Premium Starting Point</div>
            <h1 className="upr-h1">The <em>Union Path</em> Reading</h1>
            <p className="upr-sub">
              Welcome in, beautiful soul. Sixteen gentle questions to reveal exactly where you
              stand in Manifest Your Union right now — and the specific lessons, plus a matching
              Vault replay, to start with today.
            </p>
            <div className="upr-center"><Compass progress={0} /></div>
            <label className="upr-name-label" htmlFor="upr-name-input">What's your first name?</label>
            <input
              id="upr-name-input"
              className="upr-name-input"
              type="text"
              placeholder="Type your name here"
              value={name}
              onChange={(e) => setName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && setScreen("quiz")}
              maxLength={30}
            />
            <button className="upr-btn" onClick={() => setScreen("quiz")}>
              Begin My Reading{name.trim() ? `, ${name.trim()}` : ""}
            </button>
            <div className="upr-legend">
              {PHASES.map((p) => (
                <div className="upr-legend-item" key={p.id}>
                  <span className="upr-dot" style={{ background: p.color }} />
                  Module {p.module}
                </div>
              ))}
            </div>
          </>
        )}

        {screen === "quiz" && currentQ && (
          <>
            <div className="upr-progresswrap">
              <Compass progress={progress} />
              <div className="upr-progress-label">Question {index + 1} of {QUESTIONS.length}</div>
            </div>
            <div className="upr-phase-tag">
              {PHASES.find((p) => p.id === currentQ.phase)?.icon}{" "}
              {PHASES.find((p) => p.id === currentQ.phase)?.tagline}
            </div>
            <div className="upr-qcard">
              <p className="upr-qtext">"{currentQ.text}"</p>
              <div className="upr-options">
                {RATING.map((r) => (
                  <button key={r.v} className="upr-opt" onClick={() => selectAnswer(r.v)}>
                    <span className="upr-opt-num">{r.v}</span>
                    {r.label}
                  </button>
                ))}
              </div>
            </div>
            <div className="upr-navrow">
              <button className="upr-link-btn" onClick={goBack} disabled={index === 0}>← Previous</button>
              <button className="upr-link-btn" onClick={restart}>Start over</button>
            </div>
          </>
        )}

        {screen === "loading" && (
          <div className="upr-loading">
            <div className="upr-spin" style={{ display: "inline-block" }}><Compass progress={1} /></div>
            <p className="upr-loading-text">Reading your energy, {displayName}…</p>
          </div>
        )}

        {screen === "result" && result && (
          <>
            <p className="upr-greeting">A reading for {displayName}</p>
            <div className="upr-result-icon">{result.phase.icon}</div>
            <div className="upr-result-tag">Your Current Phase</div>
            <h1 className="upr-result-name" style={{ color: result.phase.color }}>{result.phase.resultName}</h1>
            <p className="upr-result-module">{result.phase.tagline}</p>
            <div className="upr-center">
              <Compass progress={1} highlight={result.phase.id === "graduate" ? null : result.phase.id} size={110} />
            </div>
            <p className="upr-insight">{displayName}, {result.phase.insight}</p>

            <div className="upr-section-label">✦ Your Lessons to Start With ✦</div>
            {result.phase.lessons.map((l, i) => (
              <div className="upr-lesson-card" key={i}>
                <div className="upr-lesson-tag">Module {l.mod} · Lesson {l.lesson}</div>
                <h3 className="upr-lesson-title">{l.title}</h3>
                <div className="upr-lesson-row">
                  <span className="upr-lesson-row-label">What it is</span>
                  <p className="upr-lesson-row-text">{l.summary}</p>
                </div>
                <div className="upr-lesson-row">
                  <span className="upr-lesson-row-label">Why now</span>
                  <p className="upr-lesson-row-text">{l.why}</p>
                </div>
                <div className="upr-lesson-row">
                  <span className="upr-lesson-row-label">Try this</span>
                  <p className="upr-lesson-row-text">{l.apply}</p>
                </div>
                <a className="upr-lesson-link" href={l.link} target="_blank" rel="noopener noreferrer">Open This Lesson →</a>
                {l.secondaryLink && (
                  <a className="upr-lesson-link-secondary" href={l.secondaryLink} target="_blank" rel="noopener noreferrer">
                    {l.secondaryLabel} →
                  </a>
                )}
              </div>
            ))}

            <div className="upr-vault-card">
              <div className="upr-vault-eyebrow">From the Inner Union Vault</div>
              <h3 className="upr-vault-title">{result.phase.vault.title}</h3>
              <p className="upr-vault-date">{result.phase.vault.date}</p>
              <p className="upr-vault-blurb">{result.phase.vault.blurb}</p>
              <a className="upr-lesson-link" href={VAULT_URL} target="_blank" rel="noopener noreferrer">Open the Vault →</a>
              <p style={{ fontSize: "11.5px", color: "rgba(245,241,232,0.45)", marginTop: "8px" }}>
                Once inside, look for this title in the left-hand list (or press Ctrl/Cmd+F to search).
              </p>
            </div>

            {result.phase.showFoundations && (
              <div className="upr-foundations-card">
                <div className="upr-foundations-eyebrow">A Gentle Companion Resource</div>
                <p className="upr-foundations-text">
                  If you'd like extra support with the basics alongside Manifest Your Union,
                  Foundations for Inner Union is a gentle, optional 3-day course covering
                  nervous system regulation, inner child work, and the S.E.L.F. Method. It's not
                  a prerequisite — just a soft companion if simplicity feels good right now.
                </p>
                <a className="upr-lesson-link" href={FOUNDATIONS_URL} target="_blank" rel="noopener noreferrer">Explore Foundations →</a>
              </div>
            )}

            <div className="upr-bottomrow">
              <button className="upr-btn upr-btn-ghost" onClick={restart}>Take It Again</button>
            </div>
          </>
        )}
      </div>
      <Footer />
    </div>
  );
}

const rootEl = document.getElementById("root");
ReactDOM.createRoot(rootEl).render(<UnionPathReading />);
</script>
</body>
</html>
