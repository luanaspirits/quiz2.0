function intensityLabel(score) {
  if (score >= 11) return "deeply rooted right now";
  if (score >= 6) return "active";
  return "gently present";
}

// Builds a standalone HTML page with the person's results baked in as plain
// text/values (no React, no external JS). This gets downloaded as a real
// file to their device. Opening that file and printing from THERE reliably

// inside Claude's sandboxed artifact preview the way this quiz itself is.
function buildResultsHTML({ displayName, primary, secondary, tertiary, scores, ranked, activePhase, comboText }) {

    <div class="eyebrow">Your Healing Plan · ${primary.name}</div>

<style>
  body{font-family:'Segoe UI',Arial,sans-serif;background:#FBF7FE;color:#2B1F3D;max-width:680px;margin:0 auto;padding:32px 24px 40px}

  .legal a{color:#A79CB5}
  @media print { body{background:#fff} a{color:inherit;text-decoration:underline} }
</style></head>
<body>
  <div class="hero">
    <div class="eyebrow">${QUIZ_TITLE}</div>

    <div style="font-size:12px;color:#C9BFDD">${today}</div>
